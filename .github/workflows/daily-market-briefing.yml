name: Daily Market Briefing

on:
  schedule:
    # 10:00 KST = 01:00 UTC. GitHub Actions schedules use UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily market briefing
        run: python src/main.py

      - name: Commit generated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/latest.html reports/*.html
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update daily market briefing"
            git push
          fi
